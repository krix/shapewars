<!doctype html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Shapewars</title>
    <style>
        html, body { background: #000; margin: 0; height: 100%; overflow: hidden; cursor: none; }
        body { display: flex; align-items: center; justify-content: center; }
        canvas { border: 0 none; background: #0a0a14; max-width: 100%; max-height: 100%; aspect-ratio: 1280 / 720; cursor: none; }
        #overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; margin: auto; width: 240px; height: 120px; text-align: center; color: #ccc; font-family: Monospace; font-size: 14px; cursor: default; }
        #play { color: #ffc603; font-size: 22px; font-weight: bold; background: #333; padding: 10px 40px; border: none; border-radius: 4px; cursor: pointer; letter-spacing: 2px; }
        #play:hover { color: #000; background: #fff; }
        #status { margin-top: 16px; }
        #fs-btn { position: fixed; top: 8px; right: 12px; color: #aaa; font-family: Monospace; font-size: 13px; cursor: pointer; z-index: 10; display: none; text-decoration: none; background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 3px; border: 1px solid #555; }
        #fs-btn:hover { color: #ffc603; border-color: #ffc603; }
    </style>
</head>
<body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>
    <a id="fs-btn" href="#">fullscreen</a>
    <div id="overlay">
        <button id="play">PLAY</button>
        <div id="status"></div>
    </div>
    <script>
        var Module = {
            canvas: document.getElementById('canvas'),
            setStatus: function(text) {
                var statusEl = document.getElementById('status');
                if (!text) {
                    document.getElementById('overlay').style.display = 'none';
                    document.getElementById('fs-btn').style.display = 'inline';
                }
                statusEl.textContent = text;
            }
        };
        document.getElementById('play').addEventListener('click', function() {
            this.style.display = 'none';
            var s = document.createElement('script');
            s.src = 'shapewars.js';
            document.head.appendChild(s);
        });
        document.getElementById('fs-btn').addEventListener('click', function(e) {
            e.preventDefault();
            var el = document.documentElement;
            if (el.requestFullscreen) {
                el.requestFullscreen();
            } else if (el.webkitRequestFullscreen) {
                el.webkitRequestFullscreen();
            }
        });
    </script>
</body>
</html>
